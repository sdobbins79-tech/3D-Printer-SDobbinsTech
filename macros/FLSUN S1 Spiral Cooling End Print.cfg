###----- spiral cooling end print -----

[gcode_macro _END_GCODE]
description: End print with circular cooling orbit
variable_cool_radius: 80
variable_cool_loops: 6
variable_z_lift: 10
variable_xy_speed: 3000
variable_z_speed: 1800
variable_retract: 2.0
variable_bed_cool_delay: 0
gcode:
  {% set cx = (printer.toolhead.axis_minimum.x + printer.toolhead.axis_maximum.x) / 2 %}
  {% set cy = (printer.toolhead.axis_minimum.y + printer.toolhead.axis_maximum.y) / 2 %}
  {% set z_now = printer.toolhead.position.z|float %}
  {% set z_max = printer.toolhead.axis_maximum.z|float %}
  {% set z_lift = printer["gcode_macro _END_GCODE"].z_lift|float %}
  {% set z_target = [z_now + z_lift, z_max]|min %}
  {% set r = printer["gcode_macro _END_GCODE"].cool_radius|float %}
  {% set loops = printer["gcode_macro _END_GCODE"].cool_loops|int %}
  {% set f_xy = printer["gcode_macro _END_GCODE"].xy_speed|int %}
  {% set f_z = printer["gcode_macro _END_GCODE"].z_speed|int %}
  {% set retract = printer["gcode_macro _END_GCODE"].retract|float %}
  {% set delay = printer["gcode_macro _END_GCODE"].bed_cool_delay|int %}

  {% set p0x = cx + r %}
  {% set p0y = cy %}
  {% set p30x = cx + (r * 0.866) %}
  {% set p30y = cy + (r * 0.500) %}
  {% set p60x = cx + (r * 0.500) %}
  {% set p60y = cy + (r * 0.866) %}
  {% set p90x = cx %}
  {% set p90y = cy + r %}
  {% set p120x = cx - (r * 0.500) %}
  {% set p120y = cy + (r * 0.866) %}
  {% set p150x = cx - (r * 0.866) %}
  {% set p150y = cy + (r * 0.500) %}
  {% set p180x = cx - r %}
  {% set p180y = cy %}
  {% set p210x = cx - (r * 0.866) %}
  {% set p210y = cy - (r * 0.500) %}
  {% set p240x = cx - (r * 0.500) %}
  {% set p240y = cy - (r * 0.866) %}
  {% set p270x = cx %}
  {% set p270y = cy - r %}
  {% set p300x = cx + (r * 0.500) %}
  {% set p300y = cy - (r * 0.866) %}
  {% set p330x = cx + (r * 0.866) %}
  {% set p330y = cy - (r * 0.500) %}

  M400
  M107
  M104 S0
  SET_GCODE_VARIABLE MACRO=M140 VARIABLE=inner_bed_only VALUE=0

  G92 E0
  G91
  {% if printer.extruder.temperature >= printer.configfile.settings.extruder.min_extrude_temp %}
    G1 E-{retract} F2100
  {% endif %}
  G90

  G1 Z{z_target} F{f_z}
  M106 S255

  UPDATE_DELAYED_GCODE ID=_END_GCODE_BED_OFF DURATION={delay}

  G1 X{p0x} Y{p0y} F{f_xy}
  {% for _ in range(loops) %}
    G1 X{p30x} Y{p30y} F{f_xy}
    G1 X{p60x} Y{p60y} F{f_xy}
    G1 X{p90x} Y{p90y} F{f_xy}
    G1 X{p120x} Y{p120y} F{f_xy}
    G1 X{p150x} Y{p150y} F{f_xy}
    G1 X{p180x} Y{p180y} F{f_xy}
    G1 X{p210x} Y{p210y} F{f_xy}
    G1 X{p240x} Y{p240y} F{f_xy}
    G1 X{p270x} Y{p270y} F{f_xy}
    G1 X{p300x} Y{p300y} F{f_xy}
    G1 X{p330x} Y{p330y} F{f_xy}
    G1 X{p0x} Y{p0y} F{f_xy}
  {% endfor %}
  M107
  G1 X{cx} Y{cy} F{f_xy}
  G28

[delayed_gcode _END_GCODE_BED_OFF]
gcode:
  M140 S0
